# =============================================================================
# vector.yaml
# -----------------------------------------------------------------------------
# 목적:
#   Spring Boot 애플리케이션이 남기는 JSON 로그 파일을 Vector가 tail 방식으로 읽어
#   GCP Pub/Sub으로 안정적으로 전송하기 위한 운영용 설정
#
# 전제:
#   - 애플리케이션 로그는 "한 줄 JSON" 형태
#   - 현재 쓰는 활성 로그와 날짜별/서비스별 로그 디렉토리가 존재할 수 있음
#   - archive, backup, 압축 로그는 실시간 수집 대상에서 제외
#   - Pub/Sub 일시 장애나 네트워크 지연에 대비해 디스크 버퍼 사용
#
# 실행:
#   vector --config /etc/vector/vector.yaml
#
# 참고:
#   - file source: https://vector.dev/docs/reference/configuration/sources/file/
#   - gcp_pubsub sink: https://vector.dev/docs/reference/configuration/sinks/gcp_pubsub/
# =============================================================================


# =============================================================================
# [0] Vector 내부 상태 저장 디렉토리
# -----------------------------------------------------------------------------
# - file source의 체크포인트(offset) 저장
# - 재시작 후 어디까지 읽었는지 기억
# - sink disk buffer 저장
#
# 운영에서는 /tmp 대신 영구 디렉토리 권장
# 예: /var/lib/vector
# =============================================================================
data_dir: /var/lib/vector


# =============================================================================
# [1] SOURCE - 로그 파일 수집
# -----------------------------------------------------------------------------
# 핵심 포인트:
#   1) 활성 로그 경로(current)와 날짜별/서비스별 경로(app)를 함께 포함
#   2) archive, backup, 압축 파일은 제외
#   3) 오래된 파일은 무시하여 대규모 환경에서 파일 수 과다 문제 완화
#   4) read_from은 운영에서는 end 권장
# =============================================================================
sources:
  app_logs:
    type: file

    # -------------------------------------------------------------------------
    # include:
    #   실제로 읽을 로그 파일 경로 패턴
    #
    # 예시 설명:
    #   /data/logs/current/*.log      -> 현재 활성 로그 파일
    #   /data/logs/app/**/*.log       -> 서비스별/날짜별 디렉토리 포함
    #
    # 운영 환경에 맞게 절대 경로로 수정 필요
    # -------------------------------------------------------------------------
    include:
      - /data/logs/current/*.log
      - /data/logs/app/**/*.log

    # -------------------------------------------------------------------------
    # exclude:
    #   실시간 수집 대상에서 제외할 경로
    #
    # 제외 권장 대상:
    #   - 압축 로그 (*.gz, *.zip)
    #   - archive/backup/old 디렉토리
    #
    # 이유:
    #   - 과거 보관 로그 재수집 방지
    #   - glob 스캔 부하 감소
    #   - checkpoint/메모리 사용량 감소
    # -------------------------------------------------------------------------
    exclude:
      - /data/logs/**/*.gz
      - /data/logs/**/*.zip
      - /data/logs/**/archive/**
      - /data/logs/**/backup/**
      - /data/logs/**/old/**

    # -------------------------------------------------------------------------
    # read_from:
    #   beginning -> 기존 파일의 처음부터 읽음 (테스트/초기 적재)
    #   end       -> Vector 기동 이후 append되는 신규 로그부터 읽음 (운영 권장)
    # -------------------------------------------------------------------------
    read_from: end

    # -------------------------------------------------------------------------
    # ignore_older_secs:
    #   지정한 초보다 오래된 파일은 실시간 수집 대상에서 제외
    #
    # 예: 172800초 = 2일
    # 대규모 운영에서 과거 날짜 디렉토리까지 무한정 훑지 않도록 제한
    # -------------------------------------------------------------------------
    ignore_older_secs: 172800

    # -------------------------------------------------------------------------
    # glob_minimum_cooldown_ms:
    #   include/exclude 패턴(glob)을 다시 스캔하는 최소 주기
    #
    # 주의:
    #   - append 감시 주기가 아니라 "새 파일/새 경로 발견"을 위한 재검색 주기
    #   - 너무 짧으면 파일시스템 부담 증가
    #   - 너무 길면 새 파일 감지 지연
    # -------------------------------------------------------------------------
    glob_minimum_cooldown_ms: 5000

    # -------------------------------------------------------------------------
    # max_read_bytes:
    #   한 번 읽기 루프에서 읽는 최대 바이트
    #
    # 로그 유입 폭증 시 너무 공격적으로 읽지 않도록 제한
    # -------------------------------------------------------------------------
    max_read_bytes: 1048576   # 1MB

    # -------------------------------------------------------------------------
    # max_line_bytes:
    #   한 줄 로그 최대 크기
    #
    # HTTP body를 그대로 남기는 구조라면 한 줄이 커질 수 있으므로 방어 필요
    # 너무 큰 JSON/스택트레이스에 대비
    # -------------------------------------------------------------------------
    max_line_bytes: 262144    # 256KB

    # -------------------------------------------------------------------------
    # file_key / host_key:
    #   이벤트에 원본 파일 경로, 호스트명을 메타데이터로 추가
    #
    # 필요 시 ETL/분석에서 유용
    # -------------------------------------------------------------------------
    file_key: file
    host_key: host


# =============================================================================
# [2] TRANSFORM - JSON 파싱 및 공통 메타데이터 보강
# -----------------------------------------------------------------------------
# 목적:
#   - 로그 한 줄(JSON 문자열)을 실제 오브젝트로 파싱
#   - 파싱 성공/실패 여부 추적
#   - Vector 수집 시각 추가
#   - 운영용 공통 메타데이터 추가
# =============================================================================
transforms:
  parse_and_enrich:
    type: remap
    inputs:
      - app_logs
    source: |
      # -----------------------------------------------------------------------
      # 원본 메시지 보존
      # - 장애 분석 시 원본 라인 확인용
      # - 운영 중 payload 크기가 너무 크면 제거 검토 가능
      # -----------------------------------------------------------------------
      .raw_message = .message

      # -----------------------------------------------------------------------
      # JSON 파싱 시도
      # - Spring Boot가 한 줄 JSON 로그를 남긴다고 가정
      # - parse_json 실패 시 이벤트를 버리지 않고 그대로 유지
      # -----------------------------------------------------------------------
      parsed, err = parse_json(.message)

      if err == null {
        # 파싱 성공 시, JSON 필드를 이벤트 최상위에 병합
        . = merge(., object!(parsed))
        .parse_status = "success"
      } else {
        # 파싱 실패 시, 실패 상태와 오류 메시지 기록
        .parse_status = "failed"
        .parse_error = to_string(err)
      }

      # -----------------------------------------------------------------------
      # Vector 수집 시각
      # - 앱 로그 생성 시각과 Vector 수집 시각의 차이를 통해
      #   지연(backlog) 여부를 분석 가능
      # -----------------------------------------------------------------------
      .vector_ingested_at = format_timestamp!(now(), format: "%+")

      # -----------------------------------------------------------------------
      # event_time 정규화
      # - 앱 로그에 @timestamp가 있으면 downstream에서 쓰기 좋게 복사
      # -----------------------------------------------------------------------
      if exists(."@timestamp") {
        .event_time = ."@timestamp"
      }

      # -----------------------------------------------------------------------
      # 운영 공통 메타데이터
      # - 파이프라인/환경 식별
      # -----------------------------------------------------------------------
      .pipeline = "vector-to-pubsub"
      .env = "prod"

      # -----------------------------------------------------------------------
      # Vector 내부 필드 정리
      # -----------------------------------------------------------------------
      del(.source_type)

      # -----------------------------------------------------------------------
      # 필요 시 제거 가능한 필드 예시
      # - payload 크기가 너무 크면 아래 중 일부 제거 가능
      # -----------------------------------------------------------------------
      # del(.timestamp)
      # del(.thread_name)
      # del(.raw_message)
      # del(.file)
      # del(.host)


# =============================================================================
# [3] SINK - GCP Pub/Sub 전송
# -----------------------------------------------------------------------------
# 목적:
#   - 변환된 이벤트를 Pub/Sub topic으로 publish
#   - 디스크 버퍼 + 재시도 + batch 설정으로 운영 안정성 확보
# =============================================================================
sinks:
  gcp_pubsub_out:
    type: gcp_pubsub
    inputs:
      - parse_and_enrich

    # -------------------------------------------------------------------------
    # GCP 프로젝트 / Pub/Sub 토픽
    # 실제 값으로 교체 필요
    # -------------------------------------------------------------------------
    project: YOUR_PROJECT_ID
    topic: YOUR_TOPIC

    # -------------------------------------------------------------------------
    # encoding:
    #   Pub/Sub message.data에 JSON 직렬화된 이벤트를 저장
    # -------------------------------------------------------------------------
    encoding:
      codec: json

    # -------------------------------------------------------------------------
    # acknowledgements:
    #   sink까지의 ack 흐름 활성화
    #   운영에서는 enabled 권장
    # -------------------------------------------------------------------------
    acknowledgements:
      enabled: true

    # -------------------------------------------------------------------------
    # batch:
    #   이벤트를 묶어서 전송
    #
    # 동작 방식:
    #   아래 3개 조건 중 "먼저 만족하는 조건"으로 전송
    #   - 이벤트 1000건 모이면 전송
    #   - 1초 지나면 전송
    #   - 총 9MB쯤 되면 전송
    #
    # 주의:
    #   "1초마다 무조건 1000건 전송"이 아니라
    #   "1000건 / 1초 / 9MB 중 먼저 만족하는 조건"이다.
    # -------------------------------------------------------------------------
    batch:
      max_events: 1000
      timeout_secs: 1
      max_bytes: 9000000

    # -------------------------------------------------------------------------
    # buffer:
    #   Pub/Sub으로 즉시 못 보낼 때 임시로 쌓아두는 버퍼
    #
    # type: disk
    #   - 운영에서는 메모리보다 디스크 권장
    #   - 네트워크 장애 / Pub/Sub 지연 / 순간 폭주 시 유실 방지에 유리
    #
    # max_size:
    #   - PoC는 256MB로도 가능
    #   - 대규모 운영은 1GB~수GB 검토 권장
    #
    # when_full: block
    #   - 버퍼가 꽉 차면 입력을 막고 데이터 보존 우선
    #   - drop_newest는 처리량 우선이나 데이터 유실 가능성 있음
    # -------------------------------------------------------------------------
    buffer:
      type: disk
      max_size: 2147483648   # 2GB
      when_full: block

    # -------------------------------------------------------------------------
    # request:
    #   네트워크/서비스 일시 오류 시 재시도 정책
    # -------------------------------------------------------------------------
    request:
      retry_attempts: 20
      retry_initial_backoff_secs: 1
      retry_max_duration_secs: 300
      timeout_secs: 30


# =============================================================================
# [4] 운영 중 임시 디버깅용 sink (기본 비활성)
# -----------------------------------------------------------------------------
# 평소 운영에서는 사용하지 않는 것을 권장
# 문제 분석 시에만 주석 해제
# =============================================================================
#  console_out:
#    type: console
#    inputs:
#      - parse_and_enrich
#    encoding:
#      codec: json